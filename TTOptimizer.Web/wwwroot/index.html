<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>TTOptimizer</title>

    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div class="page">
        <header class="app-header">
            <div>
                <h1>TTOptimizer</h1>
                <p class="subtitle">
                    Timetable optimization powered by C++ engine and ASP.NET
                </p>
            </div>

            <div class="badge">
                C++ Engine + .NET
            </div>
        </header>

        <main class="main-layout">
            <section class="panel control-panel">
                <h2>Optimization</h2>

                <p class="description">
                    Run the C++ optimization engine and receive the raw chromosome result as JSON.
                </p>

                <button id="runOptimizationButton" class="primary-button">
                    Run optimization
                </button>

                <div id="statusMessage" class="status-message">
                    Ready.
                </div>
            </section>

            <section class="panel result-panel">
                <div class="result-header">
                    <h2>Engine result</h2>

                    <button id="clearResultButton" class="secondary-button">
                        Clear
                    </button>
                </div>

                <pre id="optimizationResult" class="json-output">// Result will appear here</pre>
            </section>
        </main>

        <footer class="app-footer">
            created by Grzegorz Bainczyk
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
