<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTOrganizer - Classes</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="page-container">
        <header class="app-header">
            <div>
                <h1>Classes</h1>
                <p class="page-subtitle">Classes assigned to your organization</p>
            </div>

            <nav class="header-actions">
                <button id="backToMainButton" class="secondary-button">
                    Back
                </button>

                <button id="refreshClassesButton" class="secondary-button">
                    Refresh
                </button>
            </nav>
        </header>

        <main class="content-card">
            <div class="section-header">
                <h2>Classes list</h2>

                <button id="addClassButton" class="main-action-button">
                    Add Class
                </button>
            </div>

            <table class="data-table" id="classesTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th class="table-actions-column">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="3">Loading classes...</td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>

    <script src="js/appContext.js"></script>
    <script src="js/classes.js"></script>
</body>
</html>
